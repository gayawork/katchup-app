<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Katchup Card Generator v2</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d1a;color:#e0d6f5;font:14px/1.5 system-ui,sans-serif;padding:24px}
h1{font-size:18px;margin-bottom:18px;color:#d6baff}
.g{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.f{grid-column:1/-1}
label{display:block;font-size:11px;color:#9b89c4;margin-bottom:3px}
input,select,textarea{width:100%;background:#1a1a2e;border:1px solid #2a2a4a;border-radius:7px;color:#e0d6f5;padding:7px 10px;font-size:13px;outline:none}
input:focus,select:focus,textarea:focus{border-color:#7b5ea7}
select option{background:#1a1a2e}
textarea{resize:vertical;min-height:56px}
button{background:#7b5ea7;color:#fff;border:none;border-radius:8px;padding:10px 28px;font-size:14px;font-weight:700;cursor:pointer;margin-top:6px}
button:hover{background:#9b7ec8}button:disabled{opacity:.5;cursor:default}
.s{margin-top:12px;display:flex;flex-direction:column;gap:5px}
.si{padding:7px 12px;border-radius:6px;font-size:12px;background:#1a1a2e;border:1px solid #2a2a4a}
.ok{border-color:#4caf7d!important;color:#4caf7d}.er{border-color:#e05c7a!important;color:#e05c7a}.pe{color:#9b89c4}.sk{border-color:#3a3a5a!important;color:#5a5a8a}
</style>
</head>
<body>
<h1>Katchup Card Generator v2</h1>
<div class="g">
  <div class="f"><label>GitHub Token (session only)</label><input id="tok" type="password" placeholder="ghp_..." oninput="sessionStorage.setItem('gt',this.value);fetchNextIssueNum()"></div>
  <div class="f">
    <label>Article URL</label>
    <div style="display:flex;gap:8px">
      <input id="url" placeholder="https://..." style="flex:1" onkeydown="if(event.key==='Enter')fetchMeta()">
      <button type="button" id="fetchBtn" onclick="fetchMeta()" style="margin:0;padding:7px 16px;white-space:nowrap;flex-shrink:0">Fetch</button>
    </div>
  </div>
  <div><label>Title</label><input id="ttl" placeholder="Article headline"></div>
  <div><label>Source · Date</label><input id="src" placeholder="Forbes · Apr 13, 2026"></div>
  <div><label>Category</label><select id="cat"><option value="k-pop">K-Pop</option><option value="k-content">K-Content</option><option value="lifestyle">Lifestyle</option><option value="beauty">Beauty</option></select></div>
  <div><label>Image URL</label><input id="img" placeholder="https://..."></div>
  <div><label>Image Credit</label><input id="crd" placeholder="Source name"></div>
  <div><label>Issue # <span style="color:#5a5a8a;font-size:10px">(auto)</span></label><input id="iss" type="number" readonly style="opacity:.6;cursor:default"></div>
  <div class="f"><label>Summary (archive)</label><textarea id="sum" placeholder="Short summary…"></textarea></div>
</div>
<div style="margin-bottom:12px">
  <label style="display:block;font-size:11px;color:#9b89c4;margin-bottom:5px">Image Search (Unsplash)</label>
  <div style="display:flex;gap:8px;margin-bottom:8px">
    <input id="uq" placeholder="e.g. K-Pop concert stage" onkeydown="if(event.key==='Enter')searchUnsplash()">
    <button type="button" onclick="searchUnsplash()" style="margin:0;padding:7px 16px;white-space:nowrap;flex-shrink:0">Search</button>
  </div>
  <div id="uGrid" style="display:grid;grid-template-columns:repeat(6,1fr);gap:6px"></div>
</div>
<label style="display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:12px;color:#9b89c4;cursor:pointer">
  <input type="checkbox" id="addHero" checked style="width:auto;margin:0;cursor:pointer"> Add to Hero stack
</label>
<button id="btn" onclick="pushAll()">Push to GitHub</button>
<div class="s" id="st"></div>
<hr style="border:none;border-top:1px solid #2a2a4a;margin:28px 0 20px">
<h2 style="font-size:15px;margin-bottom:14px;color:#e05c7a">Delete Card</h2>
<div class="g" style="margin-bottom:10px">
  <div><label>Issue #</label><input id="del-iss" type="number" placeholder="12"></div>
  <div><label>Category</label><select id="del-cat"><option value="k-pop">K-Pop</option><option value="k-content">K-Content</option><option value="lifestyle">Lifestyle</option><option value="beauty">Beauty</option></select></div>
</div>
<button id="delBtn" onclick="deleteCard()" style="background:#7a2a3a">Delete Card</button>
<div class="s" id="dst"></div>
<div id="pv" style="margin-top:20px"></div>
<script>
const REPO='gayawork/katchup-app',BR='main';
const API='https://api.github.com/repos/'+REPO+'/contents/';
const CAT={'k-pop':{l:'K-Pop',p:'pill-kpop'},'k-content':{l:'K-Content',p:'pill-kcontent'},'lifestyle':{l:'Lifestyle',p:'pill-lifestyle'},'beauty':{l:'Beauty',p:'pill-beauty'}};
window.onload=()=>{
  const t=sessionStorage.getItem('gt');
  if(t){document.getElementById('tok').value=t;fetchNextIssueNum();}
  document.getElementById('st').innerHTML=['index.html (hero)','index.html (latest)','archive.html'].map(l=>`<div class="si pe">${l}: —</div>`).join('');
  ['url','ttl','src','cat','img','crd','iss','sum'].forEach(id=>{const el=document.getElementById(id);el.addEventListener('input',updatePreview);el.addEventListener('change',updatePreview)});
  updatePreview();
};
function dec(b64){const by=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));return new TextDecoder('utf-8').decode(by)}
function enc(s){const e=new TextEncoder().encode(s);let r='';for(let i=0;i<e.length;i++)r+=String.fromCharCode(e[i]);return btoa(r)}
function scCard(d){return`<div class="stack-card" onclick="window.open('${d.u}','_blank','noopener')">
  <img class="stack-card-img" src="${d.im}" alt="${d.t}" loading="lazy" onerror="this.style.display='none'">
  <div class="stack-card-body">
    <a href="${d.u}" target="_blank" rel="noopener" style="display:block;text-decoration:none;color:inherit;cursor:pointer;">
      <p class="stack-card-cat">${d.cl}</p>
      <p class="stack-card-title">${d.t}</p>
      <p class="stack-card-source">${d.sr}</p>
      <p class="stack-card-issue">Issue #${d.is}</p>
    </a>
  </div>
</div>`}
function lcCard(d){return`<article class="latest-card" data-category="${d.sl}" onclick="window.open('${d.u}','_blank','noopener')" style="cursor:pointer;">
  <img class="card-img" src="${d.im}" alt="${d.t}" loading="lazy" onerror="this.style.display='none'">
  <div class="card-body">
    <span class="pill ${d.cp}">${d.cl}</span>
    <h3 class="card-headline">${d.t}</h3>
    <span class="card-date">${d.sr}</span>
    <span class="card-issue">Issue #${d.is}</span>
    <a href="${d.u}" target="_blank" rel="noopener" class="card-link">Read more →</a>
  </div>
</article>`}
function icCard(d){return`<article class="issue-card" data-category="${d.sl}">
  <div class="card-image">
    <img src="${d.im}" alt="${d.t}" loading="lazy" onerror="this.style.display='none'">
  </div>
  <p class="card-img-credit">${d.cr}</p>
  <div class="card-body">
    <div class="issue-meta">
      <span class="issue-number">Issue #${d.is}</span>
      <span class="issue-date">${d.sr}</span>
    </div>
    <div class="issue-pills"><span class="pill ${d.cp}">${d.cl}</span></div>
    <h2 class="issue-headline">${d.t}</h2>
    <p class="issue-summary">${d.su}</p>
    <a href="${d.u}" class="issue-link" target="_blank" rel="noopener">Read original →</a>
  </div>
</article>`}
function trim(html,re,max){
  const g=new RegExp(re.source,'g');let m,arr=[];
  while((m=g.exec(html))!==null)arr.push({i:m.index,l:m[0].length});
  while(arr.length>max){const x=arr.pop();html=html.slice(0,x.i)+html.slice(x.i+x.l);}
  return html;
}
async function ghGet(f,tok){
  const r=await fetch(API+f+'?ref='+BR,{headers:{Authorization:'token '+tok,Accept:'application/vnd.github.v3+json'}});
  if(!r.ok)throw new Error((await r.json()).message||r.status);
  return r.json();
}
async function ghPut(f,body,tok){
  const r=await fetch(API+f,{method:'PUT',headers:{Authorization:'token '+tok,Accept:'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify({...body,branch:BR})});
  if(!r.ok)throw new Error((await r.json()).message||r.status);
  return r.json();
}
const si=i=>document.querySelectorAll('#st .si')[i];
function setS(i,c,m){si(i).className='si '+c;si(i).textContent=m}
const dsi=i=>document.querySelectorAll('#dst .si')[i];
function setDS(i,c,m){dsi(i).className='si '+c;dsi(i).textContent=m}
async function fetchNextIssueNum(){
  const tok=document.getElementById('tok').value.trim();
  if(!tok)return;
  try{
    const f=await ghGet('archive.html',tok);
    const txt=dec(f.content.replace(/\n/g,''));
    const re=/<span class="issue-number">Issue #(\d+)<\/span>/g;
    let m,max=15;
    while((m=re.exec(txt))!==null){const n=parseInt(m[1],10);if(n>max)max=n;}
    document.getElementById('iss').value=max+1;
    updatePreview();
  }catch(e){}
}
async function fetchMeta(){
  const url=document.getElementById('url').value.trim();
  if(!url)return;
  const btn=document.getElementById('fetchBtn');
  btn.disabled=true;btn.textContent='Fetching…';
  try{
    const r=await fetch('https://api.allorigins.win/raw?url='+encodeURIComponent(url));
    if(!r.ok)throw new Error(r.status);
    const html=await r.text();
    const doc=new DOMParser().parseFromString(html,'text/html');
    const og=n=>doc.querySelector(`meta[property="${n}"]`)?.getAttribute('content')||doc.querySelector(`meta[name="${n}"]`)?.getAttribute('content')||'';
    const title=og('og:title')||doc.querySelector('title')?.textContent||'';
    const desc=og('og:description');
    const site=og('og:site_name')||(()=>{try{return new URL(url).hostname.replace(/^www\./,'');}catch{return '';}})();
    const rawDate=og('article:published_time')||og('article:modified_time')||og('og:updated_time')||'';
    let fmtDate='';
    if(rawDate){try{fmtDate=new Date(rawDate).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}catch{}}
    if(title)document.getElementById('ttl').value=title.trim();
    if(desc)document.getElementById('sum').value=desc.trim();
    const srcVal=[site,fmtDate].filter(Boolean).join(' · ');
    if(srcVal)document.getElementById('src').value=srcVal;
    updatePreview();
  }catch(e){alert('Fetch failed: '+e.message)}
  finally{btn.disabled=false;btn.textContent='Fetch'}
}
async function pushAll(){
  const tok=document.getElementById('tok').value.trim();
  if(!tok)return alert('Enter GitHub token');
  const addHero=document.getElementById('addHero').checked;
  const sl=document.getElementById('cat').value;
  const d={
    u:document.getElementById('url').value.trim(),
    t:document.getElementById('ttl').value.trim(),
    sr:document.getElementById('src').value.trim(),
    sl,im:document.getElementById('img').value.trim(),
    cr:document.getElementById('crd').value.trim(),
    is:document.getElementById('iss').value.trim(),
    su:document.getElementById('sum').value.trim(),
    cl:CAT[sl].l,cp:CAT[sl].p
  };
  if(!d.u||!d.t)return alert('URL and Title required');
  sessionStorage.setItem('gt',tok);
  const btn=document.getElementById('btn');btn.disabled=true;
  document.getElementById('st').innerHTML=['index.html (hero)','index.html (latest)','archive.html'].map(l=>`<div class="si pe">${l}: pending…</div>`).join('');
  const SC=/<div class="stack-card"[\s\S]*?<\/div>\s*<\/div>/;
  const LC=/<article class="latest-card"[\s\S]*?<\/article>/;
  // index.html: single fetch → single write (hero + latest in one pass)
  try{
    setS(1,'pe','index.html (latest): fetching…');
    let f=await ghGet('index.html',tok),txt=dec(f.content.replace(/\n/g,''));
    if(addHero){
      setS(0,'pe','index.html (hero): applying…');
      txt=txt.replace(/(<div class="card-stack">)/,(_,g)=>g+'\n'+scCard(d)+'\n');
      txt=trim(txt,SC,4);
    }else{
      setS(0,'sk','index.html (hero): skipped');
    }
    txt=txt.replace(/(<div class="latest-grid">)/,(_,g)=>g+'\n'+lcCard(d)+'\n');
    txt=trim(txt,LC,3);
    const sha=(await ghGet('index.html',tok)).sha;
    const msg=(addHero?'add stack+latest card: ':'add latest card: ')+d.t;
    await ghPut('index.html',{message:msg,content:enc(txt),sha},tok);
    if(addHero)setS(0,'ok','index.html (hero): ✓');
    setS(1,'ok','index.html (latest): ✓');
  }catch(e){
    if(addHero)setS(0,'er','index.html (hero): ✗ '+e.message);
    setS(1,'er','index.html (latest): ✗ '+e.message);
  }
  // archive.html: always — independent of index.html result, no early return above
  try{
    setS(2,'pe','archive.html: fetching…');
    let f=await ghGet('archive.html',tok),txt=dec(f.content.replace(/\n/g,''));
    txt=txt.replace(/(<div\b[^>]*\bid="issueGrid"[^>]*>)/,(_,g)=>g+'\n'+icCard(d)+'\n');
    const sha=(await ghGet('archive.html',tok)).sha;
    await ghPut('archive.html',{message:'add issue-card: '+d.t,content:enc(txt),sha},tok);
    setS(2,'ok','archive.html: ✓');
  }catch(e){setS(2,'er','archive.html: ✗ '+e.message)}
  btn.disabled=false;
}
async function deleteCard(){
  const tok=document.getElementById('tok').value.trim();
  if(!tok)return alert('Enter GitHub token');
  const issNum=document.getElementById('del-iss').value.trim();
  if(!issNum)return alert('Enter Issue #');
  const delBtn=document.getElementById('delBtn');delBtn.disabled=true;
  document.getElementById('dst').innerHTML=['index.html (hero)','index.html (latest)','archive.html'].map(l=>`<div class="si pe">${l}: fetching…</div>`).join('');
  // Fetch both files in parallel so each can be processed independently
  const[ir,ar]=await Promise.allSettled([ghGet('index.html',tok),ghGet('archive.html',tok)]);
  const indexFile=ir.status==='fulfilled'?ir.value:null;
  const archiveFile=ar.status==='fulfilled'?ar.value:null;
  if(!indexFile){setDS(0,'er','index.html (hero): ✗ '+ir.reason?.message);setDS(1,'er','index.html (latest): ✗ '+ir.reason?.message);}
  if(!archiveFile)setDS(2,'er','archive.html: ✗ '+ar.reason?.message);
  const issTag='Issue #'+issNum+'<';
  // Extract title from archive for fallback matching of older cards without issue labels
  let articleTitle=null;
  if(archiveFile){
    const at=dec(archiveFile.content.replace(/\n/g,''));
    const tm=at.match(new RegExp('Issue #'+issNum+'<[^>]*>[\\s\\S]*?<h2 class="issue-headline">([\\s\\S]*?)<\\/h2>'));
    if(tm)articleTitle=tm[1];
  }
  // index.html — match by issue number (new cards) or title (old cards without issue label)
  if(indexFile){
    try{
      let txt=dec(indexFile.content.replace(/\n/g,''));
      let latestFound=false,heroFound=false;
      const LC=/<article class="latest-card"[\s\S]*?<\/article>/g;
      let m;
      while((m=LC.exec(txt))!==null){
        if(m[0].includes(issTag)||(articleTitle&&m[0].includes(articleTitle))){txt=txt.slice(0,m.index)+txt.slice(m.index+m[0].length);latestFound=true;break;}
      }
      const SC=/<div class="stack-card"[\s\S]*?<\/div>\s*<\/div>/g;
      while((m=SC.exec(txt))!==null){
        if(m[0].includes(issTag)||(articleTitle&&m[0].includes(articleTitle))){txt=txt.slice(0,m.index)+txt.slice(m.index+m[0].length);heroFound=true;break;}
      }
      if(latestFound||heroFound){
        const sha=(await ghGet('index.html',tok)).sha;
        await ghPut('index.html',{message:`delete card: issue #${issNum}`,content:enc(txt),sha},tok);
      }
      setDS(0,heroFound?'ok':'sk',`index.html (hero): ${heroFound?'✓ removed':'not found'}`);
      setDS(1,latestFound?'ok':'sk',`index.html (latest): ${latestFound?'✓ removed':'not found'}`);
    }catch(e){setDS(0,'er','index.html (hero): ✗ '+e.message);setDS(1,'er','index.html (latest): ✗ '+e.message);}
  }
  // archive.html — match by issue number
  if(archiveFile){
    try{
      let txt=dec(archiveFile.content.replace(/\n/g,''));
      const IC=/<article class="issue-card"[\s\S]*?<\/article>/g;
      let m,found=false;
      while((m=IC.exec(txt))!==null){
        if(m[0].includes(issTag)){txt=txt.slice(0,m.index)+txt.slice(m.index+m[0].length);found=true;break;}
      }
      if(!found){setDS(2,'sk','archive.html: not found');}
      else{
        const sha=(await ghGet('archive.html',tok)).sha;
        await ghPut('archive.html',{message:`delete card: issue #${issNum}`,content:enc(txt),sha},tok);
        setDS(2,'ok','archive.html: ✓ removed');
      }
    }catch(e){setDS(2,'er','archive.html: ✗ '+e.message);}
  }
  delBtn.disabled=false;
}
const UKEY='18eQlDzkgzOaLj6YVFCar2VBoL1Xgtl8tHrS7wnmfvE';
async function searchUnsplash(){
  const q=document.getElementById('uq').value.trim();if(!q)return;
  try{
    const r=await fetch(`https://api.unsplash.com/search/photos?query=${encodeURIComponent(q)}&per_page=6&client_id=${UKEY}`);
    if(!r.ok)throw new Error(r.status);
    const data=await r.json();
    const grid=document.getElementById('uGrid');grid.innerHTML='';
    data.results.forEach(p=>{
      const img=document.createElement('img');
      img.src=p.urls.small;
      img.style.cssText='width:100%;height:70px;object-fit:cover;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:border-color .15s';
      img.title=p.user.name+' / Unsplash';
      img.onmouseover=()=>{if(!img.dataset.sel)img.style.borderColor='#7b5ea7'};
      img.onmouseout=()=>{if(!img.dataset.sel)img.style.borderColor='transparent'};
      img.onclick=()=>{
        grid.querySelectorAll('img').forEach(x=>{x.style.borderColor='transparent';delete x.dataset.sel});
        img.style.borderColor='#d6baff';img.dataset.sel='1';
        document.getElementById('img').value=p.urls.regular;
        document.getElementById('crd').value=p.user.name+' / Unsplash';
        updatePreview();
      };
      grid.appendChild(img);
    });
  }catch(e){document.getElementById('uGrid').innerHTML=`<span style="color:#e05c7a;font-size:11px">Search failed: ${e.message}</span>`}
}
function updatePreview(){
  const sl=document.getElementById('cat').value;
  const d={
    u:document.getElementById('url').value||'#',
    t:document.getElementById('ttl').value||'Article Title',
    sr:document.getElementById('src').value||'Source · Date',
    sl,im:document.getElementById('img').value,
    cr:document.getElementById('crd').value||'',
    is:document.getElementById('iss').value||'N',
    su:document.getElementById('sum').value||'Summary text…',
    cl:CAT[sl].l,cp:CAT[sl].p
  };
  const bc={'k-pop':'#a855f7','k-content':'#3b82f6','lifestyle':'#22c55e','beauty':'#ec4899'}[sl];
  const pvImg=d.im
    ?`<img src="${d.im}" style="width:100%;height:90px;object-fit:cover;display:block">`
    :`<div style="width:100%;height:90px;background:#2a2a4a;display:flex;align-items:center;justify-content:center;color:#9b89c4;font-size:11px">no image</div>`;
  const pill=`<span style="font-size:10px;background:${bc}33;color:${bc};padding:2px 8px;border-radius:999px;display:inline-block">${d.cl}</span>`;
  const cardBase=`background:#1a1a2e;border:1px solid rgba(255,255,255,0.08);border-top:2px solid ${bc};border-radius:10px;overflow:hidden;font-family:system-ui;color:#e0d6f5`;
  const lbl=s=>`<p style="font-size:10px;color:#9b89c4;margin-bottom:5px">${s}</p>`;
  const su=d.su.length>80?d.su.slice(0,80)+'…':d.su;
  document.getElementById('pv').innerHTML=`
<p style="font-size:11px;color:#9b89c4;font-weight:600;margin-bottom:10px;border-top:1px solid #2a2a4a;padding-top:16px">Live Preview</p>
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px">
  <div>${lbl('stack-card')}
    <div style="background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:14px;overflow:hidden;font-family:system-ui;color:#e0d6f5">
      ${pvImg}
      <div style="padding:10px">
        <p style="font-size:10px;color:#d6baff;margin-bottom:3px">${d.cl}</p>
        <p style="font-size:12px;font-weight:700;margin-bottom:3px;line-height:1.3">${d.t}</p>
        <p style="font-size:10px;color:#9b89c4">${d.sr}</p>
        <p style="font-size:10px;color:#5a5a8a;margin-top:2px">Issue #${d.is}</p>
      </div>
    </div>
  </div>
  <div>${lbl('latest-card')}
    <div style="${cardBase}">
      ${pvImg}
      <div style="padding:10px">${pill}
        <p style="font-size:12px;font-weight:700;margin:5px 0 3px;line-height:1.3">${d.t}</p>
        <p style="font-size:10px;color:#9b89c4">${d.sr}</p>
        <p style="font-size:10px;color:#5a5a8a;margin-top:2px">Issue #${d.is}</p>
      </div>
    </div>
  </div>
  <div>${lbl('archive card')}
    <div style="${cardBase}">
      ${pvImg}
      <div style="padding:10px">
        <p style="font-size:10px;color:#9b89c4;margin-bottom:4px">Issue #${d.is} · ${d.sr}</p>
        ${pill}
        <p style="font-size:12px;font-weight:700;margin:5px 0 3px;line-height:1.3">${d.t}</p>
        <p style="font-size:10px;color:#9b89c4">${su}</p>
      </div>
    </div>
  </div>
</div>`;
}
</script>
</body>
</html>
